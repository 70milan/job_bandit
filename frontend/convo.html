<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Conversation</title>
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
    <link href="setup.css" rel="stylesheet" />
    <!-- Highlight.js CSS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Outer Wrapper for floating rounded look */
        .convo-wrapper {
            background: linear-gradient(160deg, #0a0a0a 0%, #141428 100%);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Draggable Top Bar */
        .title-bar {
            -webkit-app-region: drag;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            flex-shrink: 0;
        }

        #convo-session-title {
            color: rgba(100, 255, 150, 0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .window-controls {
            -webkit-app-region: no-drag;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            margin-left: auto;
            padding-left: 12px;
        }

        .close-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.35);
            cursor: pointer;
            padding: 0;
            line-height: 1;
            border-radius: 4px;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .close-btn:hover {
            color: #ff5555;
        }

        #export-btn:hover {
            color: rgba(100, 255, 150, 0.7);
        }

        /* Scrolling Chat Area */
        #conversation-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 10px;
            /* No justify-content: flex-end - this breaks scrolling.
               JS scrolls to bottom after each message via scrollTop = scrollHeight */
        }

        /* Scrollbar Styling - Minimalist */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        ::-webkit-scrollbar-corner {
            background: transparent;
        }

        /* Firefox scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
        }

        .empty-state {
            color: rgba(255, 255, 255, 0.2);
            font-size: 11px;
            text-align: center;
            padding: 30px;
            margin-top: auto;
            letter-spacing: 0.5px;
        }

        /* Bottom Stats Footer */
        #convo-avg-stats {
            padding: 8px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.25);
            font-size: 10px;
            letter-spacing: 0.5px;
            display: none;
            gap: 18px;
            justify-content: flex-end;
            font-family: monospace;
            flex-shrink: 0;
        }

        .stats-val-green {
            color: rgba(100, 255, 150, 0.7);
        }

        .stats-val-neutral {
            color: rgba(255, 255, 255, 0.35);
        }

        #convo-footer {
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <div class="convo-wrapper">
        <!-- Drag Bar Header -->
        <div class="title-bar">
            <span id="convo-session-title">Conversation Window</span>
            <div class="window-controls">
                <button id="close-btn" class="close-btn" style="font-size: 20px;" title="Hide Conversation">&times;</button>
            </div>
        </div>

        <!-- Scrollable Chat List -->
        <div id="conversation-list">
            <div class="empty-state">No conversation yet.</div>
        </div>

        <!-- Averages Footer -->
        <div id="convo-avg-stats">
            <span>AVG TTFT: <span id="avg-ttft" class="stats-val-green">--</span></span>
            <span>AVG TT: <span id="avg-tt" class="stats-val-green">--</span></span>
            <span>TOTAL EXCHANGES: <span id="avg-exchanges" class="stats-val-neutral">0</span></span>
        </div>

        <!-- Cost Footer -->
        <div id="convo-footer">
            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 20px;">
                <span style="display: flex; gap: 12px; margin-right: 10px;">
                    <span
                        style="color: rgba(255,255,255,0.25); text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px;">Tokens
                        In: <span id="tokens-in"
                            style="color: rgba(255,255,255,0.5); font-weight: 500; font-family: monospace;">0</span></span>
                    <span
                        style="color: rgba(255,255,255,0.25); text-transform: uppercase; font-size: 9px; letter-spacing: 0.5px;">Tokens
                        Out: <span id="tokens-out"
                            style="color: rgba(255,255,255,0.5); font-weight: 500; font-family: monospace;">0</span></span>
                </span>
                <span
                    style="color: rgba(255, 255, 255, 0.4); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px;">Cumulative
                    API Cost:</span>
                <span id="api-cost"
                    style="color: rgba(120, 200, 180, 0.85); font-weight: 600; font-size: 11px;">$0.00</span>
            </div>
        </div>

        <!-- Bottom bar with export -->
        <div class="convo-bottom-bar">
            <button id="export-btn" title="Export Conversation">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
                Export
            </button>
            <span style="color: rgba(255,255,255,0.15); font-size: 9px; letter-spacing: 0.5px;" class="app-version"></span>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="convo.js?v=3.2"></script>
    <script>
        // Removed anti-pattern mousedown listener
    </script>
</body>

</html>
